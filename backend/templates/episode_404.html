<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Episode not found — DevCast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --text: #efefef;
      --text-muted: #888888;
      --text-dim: #555555;
      --accent-a: #e879f9;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      top: -20vh;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 350px;
      background: radial-gradient(ellipse at center, rgba(232,121,249,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .error-box {
      text-align: center;
      max-width: 380px;
      padding: 2rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    .error-code {
      font-family: 'Syne', sans-serif;
      font-size: 5rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--surface);
      margin-bottom: 1.5rem;
      user-select: none;
    }

    .error-brand {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
    }

    .error-brand-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-a);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
      color: var(--text);
    }

    p {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      line-height: 1.6;
    }

    .cta-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1.75rem;
      padding: 0.6rem 1.25rem;
      background: var(--surface);
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .cta-link:hover {
      border-color: #3a3a3a;
      background: #181818;
    }
  </style>
</head>
<body>
  <div class="error-box">
    <div class="error-code">404</div>
    <div class="error-brand">
      <span class="error-brand-dot"></span>DevCast
    </div>
    <h1>Episode not found</h1>
    <p>This episode doesn't exist or may have been removed.</p>
    <a href="/" class="cta-link">Make your own DevCast &rarr;</a>
  </div>
</body>
</html>
